<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="تسجيل الدخول - لوحة تحكم Study With Me">
  <title>تسجيل الدخول | Study With Me</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📚</text></svg>">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 48px 36px;
      text-align: center;
      animation: fadeInUp 0.6s ease;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-primary);
    }

    .login-logo {
      width: 72px;
      height: 72px;
      background: var(--gradient-primary);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 24px;
      box-shadow: var(--shadow-glow);
    }

    .login-card h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .login-card .login-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .login-form .form-group {
      text-align: right;
    }

    .login-form .form-control {
      padding: 14px 16px;
      font-size: 1rem;
    }

    .login-form .btn-submit {
      padding: 14px;
      font-size: 1.05rem;
      margin-top: 8px;
    }

    .login-error {
      display: none;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: var(--accent);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 16px;
      text-align: center;
    }

    .login-error.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .login-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: var(--transition-fast);
    }

    .login-back:hover {
      color: var(--primary-light);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      padding: 4px;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <!-- Background Decoration -->
  <div class="bg-decoration">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Login Page -->
  <main class="login-page">
    <div class="login-card">
      <div class="login-logo">📚</div>
      <h1>تسجيل الدخول</h1>
      <p class="login-subtitle">لوحة تحكم Study With Me</p>

      <div class="login-error" id="login-error"></div>

      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="login-email">البريد الإلكتروني</label>
          <input type="email" class="form-control" id="login-email" placeholder="example@email.com" required dir="ltr" style="text-align:left;" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="login-password">كلمة المرور</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="login-password" placeholder="••••••••" required dir="ltr" style="text-align:left;padding-left:40px;" autocomplete="current-password">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="إظهار كلمة المرور"></button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="login-btn"> تسجيل الدخول</button>
      </form>

      <a href="index.html" class="login-back">→ العودة للصفحة الرئيسية</a>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect to admin
      auth.onAuthStateChanged(user => {
        if (user) {
          window.location.href = 'admin.html';
        }
      });

      // Toggle password visibility
      const toggleBtn = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('login-password');
      if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', () => {
          const isPassword = passwordInput.type === 'password';
          passwordInput.type = isPassword ? 'text' : 'password';
          toggleBtn.textContent = isPassword ? '🙈' : '🙉';
        });
      }

      // Login form
      const form = document.getElementById('login-form');
      const errorDiv = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.classList.remove('show');
        loginBtn.disabled = true;
        loginBtn.textContent = ' جاري تسجيل الدخول...';

        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        const result = await Auth.login(email, password);

        if (result.success) {
          window.location.href = 'admin.html';
        } else {
          errorDiv.textContent = result.message;
          errorDiv.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.textContent = ' تسجيل الدخول';
        }
      });
    });
  </script>
</body>
</html>
